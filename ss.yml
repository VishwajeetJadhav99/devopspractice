apiVersion: app/v1
kind: StatefulSet
metadata:
    name: ssdb
    labels:
       app: ssdb
spec:
   replicas: 3
   selector:
       matchlabels:
         app: ssdb
   template:
       metadata:
          name: ssdb
          labels:
             app: ssdb
       spec:
         containers:
          - name: ssdb
            image: mysql:latest
            ports:
             - containerPort: 80
               protocol: TCP
            env:
             - name: MYSQL_ROOT_PASSWORD
               value: "123456"
               